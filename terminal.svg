<svg width="760" height="340" viewBox="0 0 760 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .mono { font-family: "Menlo", "Monaco", "Consolas", "Courier New", monospace; }
    </style>
    <filter id="glow" x="-5%" y="-80%" width="110%" height="260%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="760" height="340" rx="12" fill="#0d1117"/>

  <!-- title bar -->
  <rect x="0" y="0" width="760" height="42" rx="12" fill="#161b22"/>
  <rect x="0" y="30" width="760" height="12" fill="#161b22"/>

  <!-- window dots -->
  <circle cx="26" cy="21" r="6" fill="#f85149"/>
  <circle cx="48" cy="21" r="6" fill="#e3b341"/>
  <circle cx="70" cy="21" r="6" fill="#3fb950"/>

  <!-- title -->
  <text x="380" y="26" class="mono" font-size="12" fill="#6e7681" text-anchor="middle">rootforgeio@github — bash — 80×24</text>

  <!-- separator -->
  <line x1="0" y1="42" x2="760" y2="42" stroke="#21262d" stroke-width="1"/>

  <!-- cmd: whoami -->
  <text x="24" y="76" class="mono" font-size="13" filter="url(#glow)">
    <tspan fill="#7ee787">rootforgeio@github</tspan><tspan fill="#c9d1d9">:</tspan><tspan fill="#79c0ff">~</tspan><tspan fill="#c9d1d9">$ whoami</tspan>
  </text>
  <text x="24" y="97" class="mono" font-size="13" fill="#8b949e">maker · sys-eng · audio dev · 12+ yrs IT</text>
  <text x="24" y="116" class="mono" font-size="13" fill="#8b949e">Siberia · psyrain.ru</text>

  <!-- cmd: ls projects/ -->
  <text x="24" y="150" class="mono" font-size="13" filter="url(#glow)">
    <tspan fill="#7ee787">rootforgeio@github</tspan><tspan fill="#c9d1d9">:</tspan><tspan fill="#79c0ff">~</tspan><tspan fill="#c9d1d9">$ ls projects/</tspan>
  </text>
  <text x="24" y="171" class="mono" font-size="13" fill="#c9d1d9">VST-Underbloom    VST_Tape_IY_Beats    WhisperTXT    Aeterra</text>
  <text x="24" y="190" class="mono" font-size="13" fill="#8b949e">SiberianDomRadar    GlassPartials    HH_Collector ...</text>

  <!-- cmd: cat stack.txt -->
  <text x="24" y="224" class="mono" font-size="13" filter="url(#glow)">
    <tspan fill="#7ee787">rootforgeio@github</tspan><tspan fill="#c9d1d9">:</tspan><tspan fill="#79c0ff">~</tspan><tspan fill="#c9d1d9">$ cat stack.txt</tspan>
  </text>
  <text x="24" y="245" class="mono" font-size="13" fill="#c9d1d9">python  c++/juce  javascript  html+css  sql  1c</text>
  <text x="24" y="264" class="mono" font-size="13" fill="#8b949e">active-directory  vmware  mikrotik  fl-studio  vst3/standalone</text>

  <!-- final prompt -->
  <text x="24" y="300" class="mono" font-size="13" filter="url(#glow)">
    <tspan fill="#7ee787">rootforgeio@github</tspan><tspan fill="#c9d1d9">:</tspan><tspan fill="#79c0ff">~</tspan><tspan fill="#c9d1d9">$ </tspan>
  </text>

  <!-- blinking cursor -->
  <rect x="199" y="286" width="8" height="16" fill="#7ee787">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
